<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <link rel="icon" type="image/svg+xml" href="public/favicon.svg">
  <title>Student Benefits Hub</title>
  <link rel="stylesheet" href="/shared.css">
  <link rel="stylesheet" href="/index.css">
</head>
<body>
  <div class="page">
    <div class="container">
      <header>
        <div class="header-row">
          <div>
            <div class="site-id">
              <h1>Student Benefits Hub</h1>
              <span class="site-sep" aria-hidden="true">|</span>
              <a href="/events/" class="site-alt">Events</a>
            </div>
            <a href="/agent/" class="grant-badge">
              <span class="grant-dot"></span>
              Curated by Grant
            </a>
          </div>
          <div class="header-actions">
            <a href="https://github.com/student-benefits/student-benefits.github.io/issues/new?template=new-benefit.yml" target="_blank" rel="noopener noreferrer" class="contribute-banner">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
              Submit a benefit
            </a>
            <a href="https://github.com/student-benefits/student-benefits.github.io/issues/new?template=new-event.yml" target="_blank" rel="noopener noreferrer" class="contribute-banner">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
              Submit an event
            </a>
          </div>
        </div>

        <div role="search" class="search-wrap">
          <svg class="search-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          <input id="search" type="search" class="search-input" placeholder="Search..." aria-label="Search benefits">
        </div>

        <div class="filter-wrap">
          <div id="filter-bar" role="group" aria-label="Filter by category" class="filter-bar"></div>
        </div>
      </header>

      <div id="results-bar" class="results-bar"></div>

      <div id="content">
        <div class="skeleton">
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>
      </div>

      <footer>
        <p>
          Built by <a href="https://github.com/jonasneves" target="_blank" rel="noopener noreferrer">jonasneves</a>
        </p>
      </footer>
    </div>
  </div>

  <script src="/shared.js"></script>
  <script src="/index.js"></script>
</body>
</html>
