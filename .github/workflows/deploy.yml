name: Deploy Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir /tmp/site
          cp index.html benefits.json categories.json /tmp/site/
          cp -r public agent /tmp/site/
          touch /tmp/site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/site

      - id: deployment
        uses: actions/deploy-pages@v4
