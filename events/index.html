<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <meta name="description" content="The best events, hackathons, and conferences worth a student's time — curated, not aggregated.">
  <link rel="icon" type="image/svg+xml" href="../public/favicon.svg">
  <title>Events · Student Benefits Hub</title>
  <link rel="stylesheet" href="/shared.css">
  <link rel="stylesheet" href="/events/events.css">
</head>
<body>
  <div class="page">
    <div class="container">

      <header>
        <div class="header-row">
          <div>
            <div class="site-id">
              <a href="/" class="site-alt">Student Benefits Hub</a>
              <span class="site-sep" aria-hidden="true">|</span>
              <h1>Events</h1>
            </div>
            <a href="/agent/" class="grant-badge">
              <span class="grant-dot"></span>
              Curated by Grant
            </a>
          </div>
          <div class="header-actions">
            <a href="https://github.com/student-benefits/student-benefits.github.io/issues/new?template=new-event.yml" target="_blank" rel="noopener noreferrer" class="contribute-banner">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
              Submit an event
            </a>
          </div>
        </div>
        <p class="subtitle">Hackathons, conferences, and fellowships — curated, not aggregated.</p>
      </header>

      <div class="filter-wrap">
        <div id="filter-bar" class="filter-bar" role="group" aria-label="Filter events"></div>
      </div>

      <div id="results-bar" class="results-bar"></div>

      <div id="content">
        <div class="skeleton">
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>
      </div>

      <footer>
        <p>Built by <a href="https://github.com/jonasneves" target="_blank" rel="noopener noreferrer">jonasneves</a></p>
      </footer>
    </div>
  </div>

  <script src="/shared.js"></script>
  <script src="/events/events.js"></script>
</body>
</html>
